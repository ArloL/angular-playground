version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
  groups:
    github-codeql-action:
      patterns:
      - "github/codeql-action*"
- package-ecosystem: "npm"
  directory: "/"
  schedule:
    interval: "monthly"
  groups:
    angular:
      applies-to: version-updates
      patterns:
      - "@angular*"
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
- package-ecosystem: "devcontainers"
  directory: "/"
  schedule:
    interval: "monthly"
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
