@if (groups.isLoading()) {
<progress class="progress is-primary" max="100"></progress>
} @else if (groups.status() === 'error') {
<p>Error: {{ groups.error() }}</p>
<button
  class="button"
  title="Retry"
  (click)="groups.reload()"
  data-testid="retry-button"
>
  <span class="icon">
    <i class="fa-solid fa-arrows-rotate"></i>
  </span>
</button>
} @else if (groups.hasValue()) {
<div class="level">
  <div class="level-left">
    <h1 class="title">
      <span class="icon">
        <i class="fa-solid fa-users"></i>
      </span>
    </h1>
  </div>
  <div class="level-right">
    <a
      class="button is-primary"
      [routerLink]="['/group/create']"
      data-testid="create-group-link"
    >
      <span class="icon">
        <i class="fa-solid fa-plus"></i>
      </span>
      <span class="icon">
        <i class="fa-solid fa-users"></i>
      </span>
    </a>
  </div>
</div>
@for (group of groups.value(); track $index) {
<p>{{ group.name }}</p>
<ul>
  <li>
    <a [routerLink]="['/group', group.id]" data-testid="view-group-link">
      <span class="icon">
        <i class="fa-solid fa-eye"></i>
      </span>
    </a>
  </li>
  <li>
    <a
      [routerLink]="['/group', group.id, 'edit']"
      data-testid="edit-group-link"
    >
      <span class="icon">
        <i class="fa-solid fa-pen"></i>
      </span>
    </a>
  </li>
  <li>
    <a
      [routerLink]="['/group', group.id, 'expenses']"
      data-testid="group-expenses-link"
    >
      <span class="icon">
        <i class="fa-solid fa-receipt"></i>
      </span>
    </a>
  </li>
  <li>
    <a
      [routerLink]="['/group', group.id, 'expenses', 'add']"
      data-testid="add-expense-link"
    >
      <span class="icon">
        <i class="fa-solid fa-plus"></i>
      </span>
      <span class="icon">
        <i class="fa-solid fa-receipt"></i>
      </span>
    </a>
  </li>
</ul>
} }
