<div class="container">
  <nav class="navbar" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <a
        class="navbar-item"
        [routerLink]="['/home']"
        [ariaCurrentWhenActive]="'page'"
        [routerLinkActive]="'is-active'"
        data-testid="nav-home"
      >
        <span class="icon">
          <i class="fa-solid fa-house"></i>
        </span>
      </a>

      @if (currentUserService.user(); as user) {
        <a
          class="navbar-item"
          [routerLink]="['/account']"
          [ariaCurrentWhenActive]="'page'"
          [routerLinkActive]="['is-active']"
          data-testid="nav-account"
        >
          <span class="icon">
            <i class="fa-solid fa-user"></i>
          </span>
        </a>
        <a class="navbar-item" (click)="logout()" data-testid="nav-logout">
          <span class="icon">
            <i
              [class]="
                loggingOut()
                  ? 'fa-solid fa-spinner fa-spin'
                  : 'fa-solid fa-right-from-bracket'
              "
            ></i>
          </span>
        </a>
      } @else {
        <a class="navbar-item" (click)="login()" data-testid="nav-login">
          <span class="icon">
            <i
              [class]="
                loggingIn() ? 'fa-solid fa-spinner fa-spin' : 'fa-solid fa-key'
              "
            ></i>
          </span>
        </a>
        @if (loginError(); as error) {
          <p class="help is-danger">{{ error }}</p>
        }
      }
    </div>
  </nav>

  <div class="m-1">
    <router-outlet />
  </div>

  <footer class="footer">
    <div class="content has-text-centered">
      <p>{{ buildTimestamp }}</p>
      @if (swUpdate.isEnabled) {
        @if (updateAvailable()) {
          <button
            class="button is-success"
            title="Update available — tap to reload"
            (click)="applyUpdate()"
            data-testid="apply-update-button"
          >
            <span class="icon">
              <i class="fa-solid fa-arrows-rotate"></i>
            </span>
          </button>
        } @else {
          <button
            class="button is-small is-light"
            title="Check for updates"
            (click)="checkForUpdate()"
            [disabled]="checkingForUpdate()"
            data-testid="check-update-button"
          >
            <span class="icon">
              <i class="fa-solid fa-arrows-rotate"></i>
            </span>
          </button>
        }
      }
    </div>
  </footer>
</div>
