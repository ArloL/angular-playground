<nav class="navbar" role="navigation" aria-label="main navigation">
  <div class="navbar-brand">
    <a role="button" class="navbar-burger" [class.is-active]="menuOpen()" aria-label="menu" [attr.aria-expanded]="menuOpen()" (click)="menuOpen.set(!menuOpen())">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </a>
  </div>

  <div class="navbar-menu" [class.is-active]="menuOpen()">
    <div class="navbar-start">
      <a class="navbar-item" routerLink="/" ariaCurrentWhenActive="page" routerLinkActive="active">
        Home
      </a>

      <a class="navbar-item" routerLink="/groups" routerLinkActive="active" ariaCurrentWhenActive="page">Groups</a>
    </div>

    <div class="navbar-end">
      <div class="navbar-item">
        @if (currentUserService.user(); as user) {
          <a routerLink="/account">{{ user.name }}</a>
          <a class="button is-primary" (click)="logout()">
            <strong>Log out</strong>
          </a>
        } @else {
          <div class="buttons">
            <a class="button is-light" [class.is-loading]="loggingIn()" (click)="login()">
              Log in
            </a>
          </div>
          @if (loginError(); as error) {
            <p class="help is-danger">{{ error }}</p>
          }
        }
      </div>
    </div>
  </div>
</nav>

<router-outlet />

<footer class="footer">
  <div class="content has-text-centered">
    <p>{{ buildTimestamp }}</p>
    @if (swUpdate.isEnabled) {
      @if (updateAvailable()) {
        <button class="button is-success" (click)="applyUpdate()">
          Update available — tap to reload
        </button>
      } @else {
        <button class="button is-small is-light" (click)="checkForUpdate()" [disabled]="checkingForUpdate()">
          @if (checkingForUpdate()) {
            Checking...
          } @else {
            Check for updates
          }
        </button>
      }
    }
  </div>
</footer>
